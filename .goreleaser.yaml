# GoReleaser 配置：构建 cc-select 三平台单二进制。
# 见 docs/tech-stack.md §8 与 docs/distribution.md。
version: 2

project_name: cc-select

before:
  hooks:
    # 前端构建：产出会被 internal/web embed。
    - sh -c "cd internal/frontend && npm ci && npm run build"

builds:
  - id: cc-select
    main: .
    binary: cc-select
    # 纯 Go（go-keyring 无 CGO），关闭 CGO 保证交叉编译简单 + Windows 零运行时。
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 暂不构建（需求小，减少构建矩阵）。
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/cc-select/cc-select/internal/version.Version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # 不显式指定 github.owner/name：GoReleaser 从 git remote(origin = matiastang/cc-select) 自动推断。
  # 显式写错 owner（如硬编码 "cc-select"）会导致发布到不存在的仓库而失败。
  draft: true
  prerelease: auto

# Homebrew Tap：macOS / Linux 一键安装。
# 目标仓库：https://github.com/matiastang/homebrew-cc-select
brews:
  - name: cc-select
    repository:
      owner: matiastang
      name: homebrew-cc-select
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    url_template: "https://github.com/matiastang/cc-select/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/matiastang/cc-select"
    description: "Shell-level AI provider isolation for Claude Code"
    license: "Apache-2.0"
    install: |
      bin.install "cc-select"
    test: |
      system "#{bin}/cc-select", "--version"
    caveats: |
      To enable shell integration, run:
        cc-select init >> ~/.zshrc
      Then reload your shell or run `source ~/.zshrc`.
      On bash use ~/.bashrc instead.

# Scoop Bucket：Windows 一键安装。
# 目标仓库：https://github.com/matiastang/scoop-cc-select
scoops:
  - name: cc-select
    repository:
      owner: matiastang
      name: scoop-cc-select
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    url_template: "https://github.com/matiastang/cc-select/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "Scoop manifest update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/matiastang/cc-select"
    description: "Shell-level AI provider isolation for Claude Code"
    license: "Apache-2.0"
