name: CI

on:
  push:
    branches: [main, dev/*]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          CGO_ENABLED: 0
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./internal/...

      # 集成测试（跨进程 shell 行为），仅 Unix 跑（Windows PowerShell 集成另配）。
      - name: Integration tests
        if: runner.os != 'Windows'
        run: go test -tags integration ./...
