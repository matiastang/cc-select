name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: internal/frontend/package-lock.json

      - name: Install frontend deps
        run: cd internal/frontend && npm ci

      - name: Run static checks
        run: make check

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        env:
          CGO_ENABLED: 0
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./internal/...

      # 集成测试（跨进程 shell 行为），仅 Unix 跑（Windows PowerShell 集成另配）。
      - name: Integration tests
        if: runner.os != 'Windows'
        run: go test -tags integration ./...

      # Windows PowerShell 集成：实跑升级链路（Install → 写 $PROFILE），断言带 UTF-8 BOM
      # 且 PS 5.1/7 能加载并定义 ccs。防「PS 5.1 按 GBK 读无 BOM 中文注释破坏语法」回归。
      - name: Windows PowerShell integration
        if: runner.os == 'Windows'
        run: go test -tags integration ./internal/rcinteg/...
