name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd internal/frontend
          npm ci
          npm run build

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 用于向 Homebrew Tap / Scoop Bucket 仓库提交 manifest，默认 GITHUB_TOKEN 无法跨仓。
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
